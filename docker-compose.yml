services:
  # Web app — http://localhost:5173
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
      - "3001:3001"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      - whisper
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - VITE_HOST=0.0.0.0
      - WHISPER_HOST=whisper

  # Local Whisper STT — http://localhost:8000
  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    ports:
      - "8000:8000"
    environment:
      - WHISPER__MODEL=Systran/faster-whisper-base
      - WHISPER__INFERENCE_DEVICE=cpu

  # Local Ollama LLM — http://localhost:11434
  # Comment out if Ollama is already running on the host
  ollama:
    image: ollama/ollama:latest
    expose:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 3 && ollama pull llama3.2 && wait"]
    profiles: [ollama]

volumes:
  node_modules:
  ollama_data:
